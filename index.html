<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Document</title>
</head>
<body>
    <nav>
        <div class="logo">ALG</div>
        <div class="title">Site Algo</div>
    </nav>
 

<div class="container">
 
    <section>
        <h2>Navigation</h2>
        <div class="buttons-container" id="buttons">
            <button class="season-button" id="s2">Saison 2</button>
            <button class="season-button" id="s3">Saison 3</button>
            <button class="season-button" id="s4">Saison 4</button>
            <button class="season-button" id="s5">Saison 5</button>
            <button class="season-button" id="s6">Saison 6</button>
            <button class="season-button" id="s7">Saison 7</button>
            <button class="season-button" id="s8">Saison 8</button>
        </div>
    </section>
 
    <section>
        <h2>Épisodes</h2>
        <div class="ep-container" id="episodes">
        </div>
    </section>
 
    <section>
        <h2>Énoncé</h2>
        <p id="statement-text">Sélectionne un exercice pour afficher l'énoncé.</p>
    </section>
 
    <section>
        <h2>TEXT AREA</h2>
        <div class="editor-grid">
            <div class="editor-container">
                <label>CODE</label>
                <textarea id="text-area" rows="12" placeholder="// code ici"></textarea>
            </div>
            <div class="editor-container">
                <label>Pseudo-code</label>
                <textarea id="pseudo-code" rows="12" placeholder="// algo ici"></textarea>
            </div>
        </div>
    </section>
 
    <section>
        <h2>CODE</h2>
        <div class="buttons-row" id="code-buttons">
            <button class="exe-btn js">JavaScript</button>
            <button class="exe-btn jquery">jQuery</button>
            <button class="exe-btn php">PHP</button>
        </div>
    </section>
 
    <section>
		<h2>INPUT</h2>
        <input type="text" id="text-area-input" placeholder="Input">
        <input type="text" id="text-area-result" placeholder="Resultat">
    </section>
 
    <section>
        <h2>Execute</h2>
        <div class="exe-row">
            <button class="exe-btn js">JavaScript</button>
            <button class="exe-btn jquery">jQuery</button>
            <button class="exe-btn php">PHP</button>
        </div>
    </section>
 
</div>
    <script src="js/script.js"></script>
</body>
</html>
