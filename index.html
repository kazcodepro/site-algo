<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Document</title>
</head>
<body>
    <nav>
    <div class="logo">ALG</div>
    <div class="title">Site Algo</div>
</nav>
 
<div class="container">
 
    <section>
        <h2>Navigation</h2>
        <div class="buttons-container" id="buttons">
            <button class="season-button">Saison 1</button>
            <button class="season-button">Saison 2</button>
            <button class="season-button">Saison 3</button>
            <button class="season-button">Saison 4</button>
            <button class="season-button">Saison 5</button>
            <button class="season-button">Saison 6</button>
            <button class="season-button">Saison 7</button>
            <button class="season-button">Saison 8</button>
        </div>
    </section>
 
    <section>
        <h2>Épisodes</h2>
        <div class="ep-container" id="episodes">
            <button class="ep-button">01</button>
            <button class="ep-button">02</button>
            <button class="ep-button">03</button>
            <button class="ep-button">04</button>
            <button class="ep-button">05</button>
            <button class="ep-button">06</button>
            <button class="ep-button">07</button>
            <button class="ep-button">08</button>
            <button class="ep-button">09</button>
            <button class="ep-button">10</button>
            <button class="ep-button">11</button>
            <button class="ep-button">12</button>
            <button class="ep-button">13</button>
            <button class="ep-button">14</button>
            <button class="ep-button">15</button>
            <button class="ep-button">16</button>
            <button class="ep-button">17</button>
        </div>
    </section>
 
    <section>
        <h2>Énoncé</h2>
        <p id="statement-text">Sélectionne un exercice pour afficher l'énoncé.</p>
    </section>
 
    <section>
        <h2>TEXT AREA</h2>
        <div class="editor-grid">
            <div class="editor-pane">
                <label>CODE</label>
                <textarea id="text-area" rows="12" placeholder="// code ici"></textarea>
            </div>
            <div class="editor-pane">
                <label>Pseudo-code</label>
                <textarea id="pseudo-code" rows="12" placeholder="// algo ici"></textarea>
            </div>
        </div>
    </section>
 
    <section>
        <h2>CODE</h2>
        <div class="buttons-row" id="code-buttons">
            <button class="exe-btn js">⚡ JavaScript</button>
            <button class="exe-btn jquery">$ jQuery</button>
            <button class="exe-btn php">⬡ PHP</button>
        </div>
    </section>
 
    <section>
        <h2>RESULTAT</h2>
        <input type="text" id="text-area-js" placeholder="Resultat">
    </section>
 
    <section>
        <h2>Execute</h2>
        <div class="exe-row">
            <button class="exe-btn js">⚡ JavaScript</button>
            <button class="exe-btn jquery">$ jQuery</button>
            <button class="exe-btn php">⬡ PHP</button>
        </div>
    </section>
 
</div>
</body>
</html>
